    fillOpacity: 0.9
  });
  const elev = m.elev ? m.elev + 'm' : '不明';
  const statusLabel = m.status ? m.status : '未評価';
  const regionLine = (m.regions_all && m.regions_all.length > 1)
    ? m.regions_all.join('・') : m.region;
  const dupNote = (m.dup_count && m.dup_count > 1)
    ? '<div class="popup-row" style="color:#888;">（候補リストに' + m.dup_count + '件重複していたためまとめて表示）</div>' : '';
  marker.bindPopup(
    '<div class="popup-name">No.' + m.no + ' ' + m.name + '</div>' +
    '<div class="popup-row">山域: ' + regionLine + '（' + m.pref + '）</div>' +
    '<div class="popup-row">標高: ' + elev + '</div>' +
    '<div class="popup-row">評価: ' + statusLabel + '</div>' +
    dupNote
  );
  marker.bindTooltip(m.name, {
    permanent: true,
    direction: 'right',
    offset: [8, 0],
    className: 'mtn-label'
  });
  clusterGroup.addLayer(marker);
  markerByName[m.name] = { marker: marker, lat: m.lat, lon: m.lon };
});

map.addLayer(clusterGroup);

// --- name search ---
const input = document.getElementById('search-input');
const resultsBox = document.getElementById('search-results');
const names = mountains.map(m => m.name);

function renderResults(matches) {
  resultsBox.innerHTML = '';
  matches.slice(0, 10).forEach(function(name) {
    const row = document.createElement('div');
    row.textContent = name;
    row.onclick = function() { goTo(name); };
    resultsBox.appendChild(row);
  });
}

function goTo(name) {
  const info = markerByName[name];
  if (!info) return;
  map.setView([info.lat, info.lon], 14, { animate: true });
  info.marker.openPopup();
  resultsBox.innerHTML = '';
  input.value = name;
}

input.addEventListener('input', function() {
  const q = input.value.trim();
  if (!q) { resultsBox.innerHTML = ''; return; }
  const matches = names.filter(n => n.includes(q));
  renderResults(matches);
});

input.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    const q = input.value.trim();
    const matches = names.filter(n => n.includes(q));
    if (matches.length > 0) goTo(matches[0]);
  }
});
</script>
</body>
